<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazyn GiTA - Rejestracja Pracownika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="Wrapper">
        <aside class="panelbok">
            <div class="logo"><h1>Magazyn GiTA</h1></div>
            <nav class="gitanav">
                <p>Zarządzanie użytkownikami</p>
                <ul>
                    <li><a href="adminpanel.html">Przegląd personelu</a></li>
                    <li><a href="rejestracja.html" class="active">Rejestracja pracownika</a></li>
                    <li><a href="#">Użytkownicy zapomniani (RODO)</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <div class="info">
                    <a href="#">Wyloguj</a>
                    <a href="#">Konto</a>
                    <a href="index.html">Strona Główna</a>
                </div>
            </header>

            <section class="zaw">
                <h2>Dodaj nowego pracownika</h2>
                
                <div class="search-bar">
                    <form id="registration-form">
                        <div class="tabelka">
                            <div>
                                <label for="reg-login">Login (5-20 znaków)</label>
                                <input type="text" id="reg-login" name="login" required minlength="5" maxlength="20" placeholder="np. mkowalski">
                            </div>
                            <div>
                                <label for="reg-email">E-mail</label>
                                <input type="email" id="reg-email" name="email" required placeholder="user@domena.pl">
                            </div>
                            <div>
                                <label for="reg-name">Imię</label>
                                <input type="text" id="reg-name" name="name" required placeholder="np. Marek">
                            </div>
                            <div>
                                <label for="reg-surname">Nazwisko</label>
                                <input type="text" id="reg-surname" name="surname" required placeholder="np. Kowalski">
                            </div>

                            <div>
                                <label for="reg-pesel">PESEL</label>
                                <input type="text" id="reg-pesel" name="pesel" required maxlength="11" placeholder="11 cyfr">
                            </div>
                            <div>
                                <label for="reg-phone">Nr telefonu (9 cyfr)</label>
                                <input type="tel" id="reg-phone" name="phone" minlength="9" maxlength="9" required placeholder="XXXXXXXXX">
                            </div>
                            <div>
                                <label for="reg-birth">Data urodzenia</label>
                                <input type="date" id="reg-birth" name="birthdate" required>
                            </div>
                            <div>
                                <label for="reg-sex">Płeć</label>
                                <select id="reg-sex" name="sex" required>
                                    <option value="">Wybierz...</option>
                                    <option value="M">Mężczyzna</option>
                                    <option value="K">Kobieta</option>
                                </select>
                            </div>

                            <div style="grid-column: span 2;">
                                <label for="reg-address">Adres zamieszkania</label>
                                <input type="text" id="reg-address" name="address" required placeholder="Miejscowość, Kod pocztowy, Ulica, Numer">
                            </div>
                            <div>
                                <label for="reg-role">Rola w systemie</label>
                                <select id="reg-role" name="role" required>
                                    <option value="Pracownik">Pracownik</option>
                                    <option value="Kierownik">Kierownik</option>
                                </select>
                            </div>
                        </div>

                        <div class="btn-group" style="margin-top: 30px;">
                            <button type="submit" class="btn-primary">Zarejestruj pracownika</button>
                            <button type="button" class="btn-secondary" onclick="window.location.href='adminpanel.html'">Anuluj</button>
                        </div>
                    </form>
                </div>

                <div id="form-msg" style="margin-top: 20px;"></div>
            </section>
        </main>
    </div>

</body>
</html>
